name: iOS App 更新监测

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: 检查版本
        run: |
          python3 << 'EOF'
          import json, urllib.request, os

          APPS = {
            "微信":     ("414478124", "cn"),
            "Surge 5":  ("1442620678", "us"),
            "Telegram": ("686449807", "us"),
          }

          try:
            with open("versions.json") as f:
              last_versions = json.load(f)
          except:
            last_versions = {}

          updates = []
          for name, (app_id, region) in APPS.items():
            url = f"https://itunes.apple.com/{region}/lookup?id={app_id}"
            data = json.loads(urllib.request.urlopen(url).read())
            result = data["results"][0]
            version = result["version"]
            notes = result.get("releaseNotes", "无更新说明")

            last = last_versions.get(name, "")
            if version != last:
              last_versions[name] = version
              updates.append(f"📱 *{name} iOS 有新版本*\n版本号：{version}\n\n更新说明：{notes}")

          with open("versions.json", "w") as f:
            json.dump(last_versions, f, ensure_ascii=False, indent=2)

          with open(os.environ["GITHUB_ENV"], "a") as f:
            if updates:
              f.write("UPDATED=true\n")
              msg = "\n\n---\n\n".join(updates)
              f.write(f"MSG<<EOF\n{msg}\nEOF\n")
          EOF

      - name: 提交版本记录
        if: env.UPDATED == 'true'
        run: |
          git config user.email "bot@github.com"
          git config user.name "bot"
          git add versions.json
          git commit -m "更新版本记录"
          git push

      - name: Telegram 推送
        if: env.UPDATED == 'true'
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
            --data-urlencode "text=${{ env.MSG }}" \
            -d "parse_mode=Markdown"
